version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd backend
        - npm ci
        - npx prisma generate
    build:
      commands:
        - echo "Backend build complete"
    postBuild:
      commands:
        - npx prisma migrate deploy || npx prisma db push
  artifacts:
    baseDirectory: backend
    files:
      - '**/*'
  cache:
    paths:
      - backend/node_modules/**/*
